--- 
- name: Policy options
  gather_facts: no
  hosts: device_roles_leaf_switch_junos

  tasks:

    - name: generating config locally
      ansible.builtin.template:
        src: ./templates/junos/policy-options.j2
        dest: ./policy-options
      delegate_to: localhost

    - name: showing config
      ansible.builtin.debug:
        msg: "{{ lookup('ansible.builtin.template', './templates/junos/policy-options.j2') }}"
